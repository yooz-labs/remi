name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: bun-darwin-arm64
            artifact: remi-darwin-arm64
            os: macos-latest
          - target: bun-darwin-x64
            artifact: remi-darwin-x64
            os: macos-latest
          - target: bun-linux-x64
            artifact: remi-linux-x64
            os: ubuntu-latest
          - target: bun-linux-arm64
            artifact: remi-linux-arm64
            os: ubuntu-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build binary
        run: bun build --compile --target=${{ matrix.target }} --outfile=dist/${{ matrix.artifact }} packages/daemon/src/cli.ts

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/remi-darwin-arm64/remi-darwin-arm64
            artifacts/remi-darwin-x64/remi-darwin-x64
            artifacts/remi-linux-x64/remi-linux-x64
            artifacts/remi-linux-arm64/remi-linux-arm64
