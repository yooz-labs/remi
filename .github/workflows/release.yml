name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  id-token: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: bun-darwin-arm64
            artifact: remi-darwin-arm64
            os: macos-latest
          - target: bun-darwin-x64
            artifact: remi-darwin-x64
            os: macos-latest
          - target: bun-linux-x64
            artifact: remi-linux-x64
            os: ubuntu-latest
          - target: bun-linux-arm64
            artifact: remi-linux-arm64
            os: ubuntu-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build binary
        run: bun build --compile --target=${{ matrix.target }} --outfile=dist/${{ matrix.artifact }} packages/daemon/src/cli.ts

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Detect release type
        id: release-type
        run: |
          if [[ "$GITHUB_REF_NAME" == *"-dev"* ]]; then
            echo "is_dev=true" >> "$GITHUB_OUTPUT"
            echo "npm_tag=dev" >> "$GITHUB_OUTPUT"
          else
            echo "is_dev=false" >> "$GITHUB_OUTPUT"
            echo "npm_tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ steps.release-type.outputs.is_dev == 'true' }}
          generate_release_notes: true
          files: |
            artifacts/remi-darwin-arm64/remi-darwin-arm64
            artifacts/remi-darwin-x64/remi-darwin-x64
            artifacts/remi-linux-x64/remi-linux-x64
            artifacts/remi-linux-arm64/remi-linux-arm64

    outputs:
      is_dev: ${{ steps.release-type.outputs.is_dev }}
      npm_tag: ${{ steps.release-type.outputs.npm_tag }}

  publish-npm:
    needs: [build, release]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm for OIDC support
        run: |
          npm install -g promise-retry
          npm install -g npm@latest
          echo "npm version: $(npm --version)"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare npm packages
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ -z "$VERSION" || ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9] ]]; then
            echo "ERROR: Invalid version from tag: '${GITHUB_REF_NAME}'" >&2
            exit 1
          fi
          echo "Publishing version: $VERSION (tag: ${{ needs.release.outputs.npm_tag }})"
          REPO_ROOT="$(pwd)"
          for PLAT in darwin-arm64 darwin-x64 linux-arm64 linux-x64; do
            mkdir -p npm/remi-$PLAT/bin
            cp "artifacts/remi-$PLAT/remi-$PLAT" "npm/remi-$PLAT/bin/remi"
            chmod +x "npm/remi-$PLAT/bin/remi"
            PLAT_PKG="$REPO_ROOT/npm/remi-$PLAT/package.json" PKG_VERSION="$VERSION" node -e "
              const fs = require('fs');
              const pkg = JSON.parse(fs.readFileSync(process.env.PLAT_PKG, 'utf8'));
              pkg.version = process.env.PKG_VERSION;
              fs.writeFileSync(process.env.PLAT_PKG, JSON.stringify(pkg, null, 2) + '\n');
            "
          done
          MAIN_PKG="$REPO_ROOT/npm/remi/package.json" PKG_VERSION="$VERSION" node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync(process.env.MAIN_PKG, 'utf8'));
            pkg.version = process.env.PKG_VERSION;
            for (const key of Object.keys(pkg.optionalDependencies || {})) {
              pkg.optionalDependencies[key] = process.env.PKG_VERSION;
            }
            fs.writeFileSync(process.env.MAIN_PKG, JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Publish platform packages
        run: |
          set -euo pipefail
          REPO_ROOT="$(pwd)"
          NPM_TAG="${{ needs.release.outputs.npm_tag }}"
          VERSION="${GITHUB_REF_NAME#v}"
          for PLAT in darwin-arm64 darwin-x64 linux-arm64 linux-x64; do
            PKG_NAME="@yooz-labs/remi-$PLAT"
            # Skip if this version is already published (idempotent for re-runs)
            if npm view "${PKG_NAME}@${VERSION}" version >/dev/null 2>&1; then
              echo "Skipping ${PKG_NAME}@${VERSION} (already published)"
              continue
            fi
            echo "Publishing ${PKG_NAME} (tag: $NPM_TAG)..."
            (cd "$REPO_ROOT/npm/remi-$PLAT" && npm publish --access public --tag "$NPM_TAG")
          done

      - name: Publish main package
        run: |
          cd npm/remi
          npm publish --access public --tag "${{ needs.release.outputs.npm_tag }}"

  update-homebrew:
    needs: [publish-npm, release]
    # Only update Homebrew for stable releases
    if: needs.release.outputs.is_dev == 'false'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Wait for npm registry propagation
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          PLATFORMS=("darwin-arm64" "darwin-x64" "linux-arm64" "linux-x64")
          echo "Waiting for all platform tarballs on npm..."
          for i in $(seq 1 30); do
            ALL_READY=true
            for PLAT in "${PLATFORMS[@]}"; do
              URL="https://registry.npmjs.org/@yooz-labs/remi-${PLAT}/-/remi-${PLAT}-${VERSION}.tgz"
              if ! curl -sfI "$URL" > /dev/null 2>&1; then
                ALL_READY=false
                break
              fi
            done
            if [[ "$ALL_READY" == true ]]; then
              echo "All packages available after ${i}0 seconds"
              break
            fi
            if [[ $i -eq 30 ]]; then
              echo "ERROR: Timed out waiting for npm packages" >&2
              for PLAT in "${PLATFORMS[@]}"; do
                URL="https://registry.npmjs.org/@yooz-labs/remi-${PLAT}/-/remi-${PLAT}-${VERSION}.tgz"
                if curl -sfI "$URL" > /dev/null 2>&1; then
                  echo "  $PLAT: ready"
                else
                  echo "  $PLAT: NOT READY"
                fi
              done
              exit 1
            fi
            sleep 10
          done

      - name: Update Homebrew formula
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          bash scripts/update-homebrew.sh "$VERSION" > /tmp/remi.rb
          gh api repos/yooz-labs/homebrew-tap/contents/Formula/remi.rb \
            --method PUT \
            --field message="remi ${VERSION}" \
            --field content="$(base64 -w 0 /tmp/remi.rb)" \
            --field sha="$(gh api repos/yooz-labs/homebrew-tap/contents/Formula/remi.rb --jq .sha)"
          echo "Updated homebrew formula to ${VERSION}"
