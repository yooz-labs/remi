name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  spelling:
    name: Spelling
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: crate-ci/typos@v1.28.4

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bunx biome check .

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Test with coverage
        run: bun test --coverage --coverage-reporter=text --coverage-reporter=lcov
      - name: Check coverage threshold
        run: |
          COVERAGE=$(bun test --coverage 2>&1 | grep "All files" | awk '{print $NF}' | tr -d '%')
          echo "Line coverage: ${COVERAGE}%"
          if [ "$(echo "$COVERAGE < 60" | bc -l)" -eq 1 ]; then
            echo "Coverage ${COVERAGE}% is below 60% threshold"
            exit 1
          fi

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bunx playwright install chromium --with-deps
      - run: bun run test:e2e

  auto-release:
    name: Auto Release
    needs: [spelling, lint, typecheck, test, e2e]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # Generate a GitHub App token so the tag push triggers release.yml.
      # GITHUB_TOKEN pushes cannot trigger downstream workflows (GitHub security policy).
      - name: Generate App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Check for dev version on main
        id: check
        run: |
          VERSION=$(jq -r '.version' package.json)
          if [[ "$VERSION" == *"-dev"* ]]; then
            STABLE="${VERSION%%-*}"
            echo "is_dev=true" >> "$GITHUB_OUTPUT"
            echo "stable_version=$STABLE" >> "$GITHUB_OUTPUT"
            echo "Detected dev version $VERSION on main, will release as $STABLE"
          else
            echo "is_dev=false" >> "$GITHUB_OUTPUT"
            echo "Version $VERSION is already stable, no auto-release needed"
          fi

      - name: Strip dev suffix and release
        if: steps.check.outputs.is_dev == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          bun install --frozen-lockfile
          ./scripts/bump-version.sh --push stable
