name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, develop]

# Pinned bun version for the whole pipeline. 1.3.12's `bun build --compile`
# silently ships broken binaries (see release.yml smoke test + PR #…).
# Keep CI and release.yml on the same pin so test outcomes match the binary
# we actually publish. Bump in lockstep after validating against a real
# compiled binary.
env:
  BUN_VERSION: 1.3.11

jobs:
  spelling:
    name: Spelling
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: crate-ci/typos@v1.28.4

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --frozen-lockfile
      - run: bunx biome check .

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --frozen-lockfile
      - run: bun run typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --frozen-lockfile
      - name: Test with coverage
        run: bun test --coverage --coverage-reporter=text --coverage-reporter=lcov
      - name: Check coverage threshold
        run: |
          # The "All files" row is pipe-delimited: File | % Funcs | % Lines | Uncovered.
          # % Lines is the 3rd field. Strip ANSI colour codes first (bun colourises
          # on a TTY) and fail loudly if parsing yields a non-number — the previous
          # `awk '{print $NF}'` extracted the trailing "|", silently passing the gate.
          COVERAGE=$(bun test --coverage 2>&1 | grep "All files" | head -1 \
            | sed 's/\x1b\[[0-9;]*m//g' | awk -F'|' '{gsub(/[[:space:]]/,"",$3); print $3}' | tr -d '%')
          echo "Line coverage: ${COVERAGE}%"
          if ! echo "$COVERAGE" | grep -qE '^[0-9]+(\.[0-9]+)?$'; then
            echo "Could not parse line coverage from bun output"
            exit 1
          fi
          if [ "$(echo "$COVERAGE < 60" | bc -l)" -eq 1 ]; then
            echo "Coverage ${COVERAGE}% is below 60% threshold"
            exit 1
          fi

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [test]
    # E2E is informational only, not a release gate.
    # Docker-based Playwright tests are too heavy for CI.
    if: false
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --frozen-lockfile
      - run: bunx playwright install chromium --with-deps
      - run: bun run test:e2e

  # NOTE: Auto-bump-dev removed. Dev builds and npm @dev publishes are no longer
  # done in CI. Use local Docker builds for testing on develop. Binary builds and
  # npm publishing only happen on main via release.yml (triggered by version tags).
  # To bump dev version locally: ./scripts/bump-version.sh dev

  # Auto-release stable version when develop merges into main.
  # Strips -dev suffix, commits, tags, and pushes to trigger release.yml.
  auto-release:
    name: Auto Release
    needs: [spelling, lint, typecheck, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      released: ${{ steps.check.outputs.is_dev }}
    steps:
      - name: Generate App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Check for dev version on main
        id: check
        run: |
          VERSION=$(jq -r '.version' package.json)
          if [[ "$VERSION" == *"-dev"* ]]; then
            STABLE="${VERSION%%-*}"
            echo "is_dev=true" >> "$GITHUB_OUTPUT"
            echo "stable_version=$STABLE" >> "$GITHUB_OUTPUT"
            echo "Detected dev version $VERSION on main, will release as $STABLE"
          else
            echo "is_dev=false" >> "$GITHUB_OUTPUT"
            echo "Version $VERSION is already stable, no auto-release needed"
          fi

      - name: Strip dev suffix and release
        if: steps.check.outputs.is_dev == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          bun install --frozen-lockfile
          ./scripts/bump-version.sh --push --force stable

  # After a stable release on main, merge main back into develop and
  # bump to the next patch dev version (e.g. 0.4.13 -> 0.4.14-dev.1).
  sync-develop:
    name: Sync Develop After Release
    needs: [auto-release]
    if: needs.auto-release.outputs.released == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@v5
        with:
          ref: develop
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Merge main into develop
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          if git merge origin/main --no-edit; then
            echo "Merge succeeded cleanly"
          else
            # Verify this is actually a merge conflict, not a different failure
            if ! git diff --name-only --diff-filter=U | grep -q .; then
              echo "Error: merge failed but no conflicts detected. Aborting." >&2
              git merge --abort || true
              exit 1
            fi
            echo "Resolving version file conflicts (bump-version.sh will overwrite)..."
            git checkout --ours package.json packages/daemon/src/cli.ts
            git add package.json packages/daemon/src/cli.ts
            # Fail if there are still unresolved conflicts beyond version files
            if git diff --name-only --diff-filter=U | grep -q .; then
              echo "Error: unresolved merge conflicts beyond version files:" >&2
              git diff --name-only --diff-filter=U >&2
              git merge --abort || true
              exit 1
            fi
            git commit --no-edit
          fi

      - name: Bump to next dev version
        run: |
          bun install --frozen-lockfile
          ./scripts/bump-version.sh dev
          # Push branch only (no tag to avoid triggering a dev release)
          git push origin develop
