<!-- Menu-bar "r" mark, LOCAL-CLIENT state (#650): the r rendered BOLD inside
     the outline square. Deviation from the spec's literal "hollow stroke"
     wording: a hollow letterform at 18 pt leaves sub-pixel walls that render
     as mush (tried; see PR) - the bold-r keeps the three-state ladder
     (thin outline -> bold r -> filled square) legible at a glance. -->
<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 18 18">
  <rect x="1.65" y="1.65" width="14.7" height="14.7" rx="3.6" fill="none" stroke="#000" stroke-width="1.3"/>
  <g fill="none" stroke="#000" stroke-width="2.5" stroke-linecap="round">
    <path d="M7 6.4 V 12.2"/>
    <path d="M7 9.9 Q 7 7.1 10.9 7.3"/>
  </g>
</svg>
