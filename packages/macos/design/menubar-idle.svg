<!-- Menu-bar "r" mark, IDLE state (#650): plain outline, everything stroked.
     Template image: only ALPHA matters; macOS tints for light/dark menu bars.
     Shared geometry across the three variants: rounded square (1.65,1.65,
     14.7x14.7, rx 3.6) + lowercase r (stem M7 6.2 V12.3, shoulder quadratic
     M7 9.9 Q7 6.9 11.1 7.2). Regenerate PDFs: scripts/generate-menubar-icons.sh -->
<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 18 18">
  <g fill="none" stroke="#000" stroke-width="1.3" stroke-linecap="round">
    <rect x="1.65" y="1.65" width="14.7" height="14.7" rx="3.6"/>
    <path d="M7 6.2 V 12.3"/>
    <path d="M7 9.9 Q 7 6.9 11.1 7.2"/>
  </g>
</svg>
