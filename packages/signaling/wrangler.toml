# Remi Signaling Worker
# Handles WebRTC signaling for NAT traversal

name = "remi-signaling"
main = "src/index.ts"
compatibility_date = "2025-01-10"

# Use Durable Objects for connection state
[[durable_objects.bindings]]
name = "CONNECTIONS"
class_name = "ConnectionRoom"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["ConnectionRoom"]

[[migrations]]
tag = "v2"

[[migrations]]
tag = "v3"
deleted_classes = ["DeviceRoom"]

# Development settings
[dev]
port = 8787
local_protocol = "http"

# Environment variables
[vars]
MAX_CONNECTIONS_PER_ROOM = "2"
CONNECTION_TIMEOUT_MS = "300000"  # 5 minutes
CODE_LENGTH = "8"
